name: Nexus AI CI

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint-and-test:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: ⬇️ Checkout Repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: 🔍 Lint with Ruff (fast linter)
        run: |
          pip install ruff
          ruff check src/ tests/ --ignore E501

      - name: 🧪 Run Unit Tests (excluding manual/integration tests)
        run: |
          python -m pytest tests/ -v \
            --ignore=tests/test_email_agent_manual.py \
            --ignore=tests/test_calendar_agent_manual.py \
            --ignore=tests/test_task_agent_manual.py \
            --ignore=tests/test_orchestrator_manual.py \
            --cov=src \
            --cov-report=term-missing
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: ✅ Upload Coverage Badge
        if: matrix.python-version == '3.11'
        run: echo "Coverage report generated."
